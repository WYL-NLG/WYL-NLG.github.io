<script>

  </header>
  <main>
    
  <div class="container">
    <section class="section">
      
        
        <div style="max-width: 1000px; margin: 0 auto;">
          <h2 class="section-title" style="margin-top: 60px; margin-bottom: 40px; text-align: center;">出版物</h2>
          
          
          <div style="background: var(--light-gray); padding: 20px; border-radius: var(--border-radius); margin-bottom: 40px; box-shadow: var(--shadow);">
            <h3 style="margin-bottom: 20px; font-size: 1.2rem; color: var(--primary-color);">筛选</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
              <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">年份</label>
                <select id="year-filter" style="width: 100%; padding: 8px; border: 1px solid var(--medium-gray); border-radius: var(--border-radius); background: var(--white);">
                  <option value="all">全部</option>
                  <option value="2026">2026</option>
                  <option value="2025">2025</option>
                  <option value="2024">2024</option>
                </select>
              </div>
              <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">作者</label>
                <input type="text" id="author-filter" placeholder="输入作者姓名" style="width: 100%; padding: 8px; border: 1px solid var(--medium-gray); border-radius: var(--border-radius); background: var(--white);">
              </div>
              <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">关键词</label>
                <input type="text" id="keyword-filter" placeholder="输入关键词" style="width: 100%; padding: 8px; border: 1px solid var(--medium-gray); border-radius: var(--border-radius); background: var(--white);">
              </div>
              <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">种类</label>
                <select id="type-filter" style="width: 100%; padding: 8px; border: 1px solid var(--medium-gray); border-radius: var(--border-radius); background: var(--white);">
                  <option value="all">全部</option>
                  <option value="conference">会议论文</option>
                  <option value="journal">期刊论文</option>
                  <option value="preprint">预印本</option>
                </select>
              </div>
            </div>
            <div style="margin-top: 20px; text-align: center;">
              <button id="reset-filter" style="background: var(--primary-color); color: white; border: none; padding: 10px 20px; border-radius: var(--border-radius); cursor: pointer; font-weight: 500; transition: var(--transition);">
                重置筛选
              </button>
            </div>
          </div>
          
          
          <div class="publications-container">
            
            <div class="year-section" data-year="2026">
              <div class="year-header" style="display: flex; justify-content: space-between; align-items: center; background: #1e40af; color: white; padding: 15px 20px; border-radius: var(--border-radius); cursor: pointer; margin-bottom: 20px; transition: var(--transition); box-shadow: var(--shadow);">
                <h3 style="margin: 0; font-size: 1.3rem; font-weight: 700; text-shadow: 0 1px 2px rgba(0,0,0,0.2);">2026</h3>
                <span class="year-toggle" style="font-size: 1.5rem; transition: transform 0.3s ease; font-weight: 700;">+</span>
              </div>
              <div class="year-content" style="display: none; background: var(--light-gray); padding: 20px; border-radius: var(--border-radius); margin-bottom: 30px;">
                <p style="text-align: center; color: var(--text-light); padding: 40px 0;">暂无出版物</p>
              </div>
            </div>
            
            
            <div class="year-section" data-year="2025">
              <div class="year-header" style="display: flex; justify-content: space-between; align-items: center; background: #1e40af; color: white; padding: 15px 20px; border-radius: var(--border-radius); cursor: pointer; margin-bottom: 20px; transition: var(--transition); box-shadow: var(--shadow);">
                <h3 style="margin: 0; font-size: 1.3rem; font-weight: 700; text-shadow: 0 1px 2px rgba(0,0,0,0.2);">2025</h3>
                <span class="year-toggle" style="font-size: 1.5rem; transition: transform 0.3s ease; font-weight: 700;">+</span>
              </div>
              <div class="year-content" style="display: none; background: var(--light-gray); padding: 20px; border-radius: var(--border-radius); margin-bottom: 30px;">
                <p style="text-align: center; color: var(--text-light); padding: 40px 0;">暂无出版物</p>
              </div>
            </div>
            
            
            <div class="year-section" data-year="2024">
              <div class="year-header" style="display: flex; justify-content: space-between; align-items: center; background: #1e40af; color: white; padding: 15px 20px; border-radius: var(--border-radius); cursor: pointer; margin-bottom: 20px; transition: var(--transition); box-shadow: var(--shadow);">
                <h3 style="margin: 0; font-size: 1.3rem; font-weight: 700; text-shadow: 0 1px 2px rgba(0,0,0,0.2);">2024</h3>
                <span class="year-toggle" style="font-size: 1.5rem; transition: transform 0.3s ease; font-weight: 700;">+</span>
              </div>
              <div class="year-content" style="display: none; background: var(--light-gray); padding: 20px; border-radius: var(--border-radius); margin-bottom: 30px;">
                <p style="text-align: center; color: var(--text-light); padding: 40px 0;">暂无出版物</p>
              </div>
            </div>
          </div>
        </div>
        
        
        <script>
          
          document.querySelectorAll('.year-header').forEach(header => {
            header.addEventListener('click', function() {
              const content = this.nextElementSibling;
              const toggle = this.querySelector('.year-toggle');
              
              if (content.style.display === 'none' || content.style.display === '') {
                content.style.display = 'block';
                toggle.style.transform = 'rotate(45deg)';
              } else {
                content.style.display = 'none';
                toggle.style.transform = 'rotate(0)';
              }
            });
          });
          
          
          function filterPublications() {
            const yearFilter = document.getElementById('year-filter').value;
            
            document.querySelectorAll('.year-section').forEach(section => {
              const year = section.dataset.year;
              const header = section.querySelector('.year-header');
              
              
              if (yearFilter === 'all' || year === yearFilter) {
                header.style.display = 'flex';
              } else {
                header.style.display = 'none';
                section.querySelector('.year-content').style.display = 'none';
                section.querySelector('.year-toggle').style.transform = 'rotate(0)';
              }
            });
          }
          
          
          document.getElementById('reset-filter').addEventListener('click', function() {
            document.getElementById('year-filter').value = 'all';
            document.getElementById('author-filter').value = '';
            document.getElementById('keyword-filter').value = '';
            document.getElementById('type-filter').value = 'all';
            filterPublications();
          });
          
          
          document.getElementById('year-filter').addEventListener('change', filterPublications);
          document.getElementById('author-filter').addEventListener('input', filterPublications);
          document.getElementById('keyword-filter').addEventListener('input', filterPublications);
          document.getElementById('type-filter').addEventListener('change', filterPublications);
          
          
          document.querySelector('.year-section[data-year="2026"] .year-header').click();
        </script>
      
    </section>
  </div>

  </main>
